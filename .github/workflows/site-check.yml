name: Site workflow check

on:
  push:
    branches: [preview]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  current-site-workflows:
    name: Check existing site workflows
    runs-on: ubuntu-latest
    steps:
      - name: Clone preview branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git clone --depth 1 --branch preview "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" site

      - name: Check current site files and paths
        run: |
          cd site
          set -e
          for f in index.html prestations.html apropos.html avis.html devis.html contact.html mentions-legales.html confidentialite.html styles.css script.js hero-bordeaux-menage.png portrait-menage-bordeaux.png; do
            test -f "$f" || { echo "Missing file: $f"; exit 1; }
          done

          node --check script.js

          ! grep -R "Laetitia\|Letícia\|Nykuto Services\|votre.email@gmail.com\|CONTACT_EMAIL\|assets/portrait-menage-bordeaux.png\|assets/hero-bordeaux-menage.png" *.html script.js

          grep -q "Leticia" index.html
          grep -q 'const WHATSAPP_NUMBER = "33768345608"' script.js
          grep -q 'window.open(url, "_blank", "noopener,noreferrer")' script.js
          grep -q 'zoneSelect?.addEventListener("change"' script.js
          grep -q 'serviceMap' script.js

          grep -q 'hero-bordeaux-menage.png' index.html
          grep -q 'portrait-menage-bordeaux.png' index.html
          grep -q 'https://wa.me/33768345608' contact.html
          grep -q 'id="quote-form"' devis.html
          grep -q 'id="review-form"' avis.html
          grep -q 'Cloudflare Pages' mentions-legales.html
          grep -q 'Protection des données' confidentialite.html

          for key in menage-regulier menage-ponctuel repassage grand-nettoyage; do
            grep -q "devis.html?service=$key" prestations.html
            grep -q "\"$key\"" script.js
          done

          for page in index.html prestations.html apropos.html avis.html devis.html contact.html mentions-legales.html confidentialite.html; do
            grep -q 'class="nav-toggle"' "$page"
            grep -q 'id="main-nav"' "$page"
            grep -q '<script src="script.js"></script>' "$page"
          done

          node <<'NODE'
          const fs = require('fs');
          const pages = ['index.html','prestations.html','apropos.html','avis.html','devis.html','contact.html','mentions-legales.html','confidentialite.html'];
          let failed = false;
          for (const page of pages) {
            const html = fs.readFileSync(page, 'utf8');
            const refs = html.matchAll(/(?:href|src)="([^"]+)"/g);
            for (const m of refs) {
              const ref = m[1];
              if (/^(https?:|mailto:|tel:|#)/.test(ref)) continue;
              const target = ref.split('?')[0].split('#')[0];
              if (target && !fs.existsSync(target)) {
                console.error(`${page} links to missing resource: ${ref}`);
                failed = true;
              }
            }
          }
          if (failed) process.exit(1);
          console.log('All existing site workflow checks passed.');
          NODE

name: Site tests

on:
  push:
    branches:
      - preview
  workflow_dispatch:

concurrency:
  group: service-menage-site-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-1-site-web:
    name: Run 1 — Site web static checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout preview
        uses: actions/checkout@v4
        with:
          ref: preview

      - name: Check JavaScript syntax
        run: node --check script.js

      - name: Check required files
        run: |
          set -e
          for file in index.html prestations.html apropos.html avis.html devis.html contact.html mentions-legales.html confidentialite.html styles.css script.js hero-bordeaux-menage.png portrait-menage-bordeaux.png package.json playwright.config.js tests/essential-site.spec.js; do
            if [ ! -f "$file" ]; then
              echo "Missing required file: $file"
              exit 1
            fi
          done

      - name: Check current branding and placeholders
        run: |
          set -e
          if grep -R -n "Laetitia\|Letícia\|Nykuto Services\|votre.email@gmail.com\|CONTACT_EMAIL\|assets/portrait-menage-bordeaux.png\|assets/hero-bordeaux-menage.png" *.html script.js; then
            echo "Old branding, placeholder, or obsolete asset path found."
            exit 1
          fi
          grep -q "Leticia" index.html

      - name: Check forms and WhatsApp wiring
        run: |
          set -e
          grep -q 'const WHATSAPP_NUMBER = "33768345608"' script.js
          grep -q 'window.open(url, "_blank", "noopener,noreferrer")' script.js
          grep -q 'zoneSelect?.addEventListener("change"' script.js
          grep -q 'serviceMap' script.js
          grep -q 'id="quote-form"' devis.html
          grep -q 'id="review-form"' avis.html
          grep -q 'https://wa.me/33768345608' contact.html
          for key in menage-regulier menage-ponctuel repassage grand-nettoyage; do
            grep -q "devis.html?service=$key" prestations.html
            grep -q "\"$key\"" script.js
          done

      - name: Check internal links and resources
        run: |
          node <<'NODE'
          const fs = require('fs');
          const pages = ['index.html','prestations.html','apropos.html','avis.html','devis.html','contact.html','mentions-legales.html','confidentialite.html'];
          let failed = false;
          for (const page of pages) {
            const html = fs.readFileSync(page, 'utf8');
            for (const match of html.matchAll(/(?:href|src)="([^"]+)"/g)) {
              const ref = match[1];
              if (/^(https?:|mailto:|tel:|#)/.test(ref)) continue;
              const target = ref.split('?')[0].split('#')[0];
              if (target && !fs.existsSync(target)) {
                console.error(`${page} links to missing resource: ${ref}`);
                failed = true;
              }
            }
          }
          if (failed) process.exit(1);
          console.log('All internal links and resources are valid.');
          NODE

  run-2-smoke-test:
    name: Run 2 — Smoke test pages
    needs: run-1-site-web
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout preview
        uses: actions/checkout@v4
        with:
          ref: preview
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm install
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Start local static server
        run: |
          npx http-server . -p 4173 -s > server.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4173/index.html > /dev/null; then
              echo "Static server is ready."
              exit 0
            fi
            sleep 1
          done
          echo "Static server did not start."
          cat server.log
          exit 1
      - name: Run smoke page-load tests
        env:
          BASE_URL: http://127.0.0.1:4173
        run: npx playwright test tests/essential-site.spec.js --project=chromium --grep "\\[smoke\\]" --reporter=list

  run-3-navigation-clicks:
    name: Run 3 — Navigation and clicks
    needs: run-1-site-web
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout preview
        uses: actions/checkout@v4
        with:
          ref: preview
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm install
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Start local static server
        run: |
          npx http-server . -p 4173 -s > server.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4173/index.html > /dev/null; then
              echo "Static server is ready."
              exit 0
            fi
            sleep 1
          done
          echo "Static server did not start."
          cat server.log
          exit 1
      - name: Run navigation and mobile tests
        env:
          BASE_URL: http://127.0.0.1:4173
        run: npx playwright test tests/essential-site.spec.js --project=chromium --grep "\\[navigation\\]|\\[mobile\\]" --reporter=list

  run-4-forms-whatsapp:
    name: Run 4 — Forms and WhatsApp
    needs: run-1-site-web
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout preview
        uses: actions/checkout@v4
        with:
          ref: preview
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm install
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Start local static server
        run: |
          npx http-server . -p 4173 -s > server.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4173/index.html > /dev/null; then
              echo "Static server is ready."
              exit 0
            fi
            sleep 1
          done
          echo "Static server did not start."
          cat server.log
          exit 1
      - name: Run form and WhatsApp tests
        env:
          BASE_URL: http://127.0.0.1:4173
        run: npx playwright test tests/essential-site.spec.js --project=chromium --grep "\\[forms\\]|\\[contact\\]" --reporter=list

  run-5-seo-content:
    name: Run 5 — SEO and content sanity
    needs: run-1-site-web
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout preview
        uses: actions/checkout@v4
        with:
          ref: preview

      - name: Run static SEO and content tests
        run: |
          node <<'NODE'
          const fs = require('fs');
          const pages = ['index.html','prestations.html','apropos.html','avis.html','devis.html','contact.html','mentions-legales.html','confidentialite.html'];
          let failed = false;

          function decodeHtml(value) {
            return String(value || '')
              .replace(/&amp;/g, '&')
              .replace(/&quot;/g, '"')
              .replace(/&#39;/g, "'")
              .replace(/&nbsp;/g, ' ')
              .trim();
          }

          function getTitle(html) {
            return decodeHtml(html.match(/<title>([\s\S]*?)<\/title>/i)?.[1] || '');
          }

          function getDescription(html) {
            const nameFirst = html.match(/<meta\s+[^>]*name=["']description["'][^>]*content=["']([^"']+)["'][^>]*>/i)?.[1];
            const contentFirst = html.match(/<meta\s+[^>]*content=["']([^"']+)["'][^>]*name=["']description["'][^>]*>/i)?.[1];
            return decodeHtml(nameFirst || contentFirst || '');
          }

          for (const page of pages) {
            const html = fs.readFileSync(page, 'utf8');
            const title = getTitle(html);
            const description = getDescription(html);
            console.log(`${page}`);
            console.log(`  title: ${title}`);
            console.log(`  description: ${description}`);

            if (title.length < 8) {
              console.error(`SEO error in ${page}: missing or too short <title>.`);
              failed = true;
            }
            if (description.length < 20) {
              console.error(`SEO error in ${page}: missing or too short meta description.`);
              failed = true;
            }
            if (!/(Leticia|Bordeaux|ménage|menage)/i.test(`${title} ${description}`)) {
              console.error(`SEO error in ${page}: title/description should mention Leticia, Bordeaux, or ménage.`);
              failed = true;
            }
          }

          if (failed) process.exit(1);
          console.log('All static SEO checks passed.');
          NODE

name: Repository hygiene

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main, preview]

permissions:
  contents: read

concurrency:
  group: repository-hygiene-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  hygiene:
    name: Repository hygiene validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate repository hygiene
        run: node scripts/validate-repository-hygiene.js
      - name: Upload hygiene report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repository-hygiene-report
          if-no-files-found: ignore
          path: reports/repository-hygiene-report.txt

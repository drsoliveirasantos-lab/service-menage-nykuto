name: Essential site tests

on:
  push:
    branches:
      - preview
      - main
  workflow_dispatch:

jobs:
  essential-browser-tests:
    name: Essential browser and user-flow tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout preview
        uses: actions/checkout@v4
        with:
          ref: preview

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start local static server
        run: |
          npx http-server . -p 4173 -s > server.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4173/index.html > /dev/null; then
              echo "Static server is ready."
              exit 0
            fi
            sleep 1
          done
          echo "Static server did not start."
          cat server.log
          exit 1

      - name: Run essential Playwright tests
        env:
          BASE_URL: http://127.0.0.1:4173
        run: npx playwright test tests/essential-site.spec.js --project=chromium --reporter=list
